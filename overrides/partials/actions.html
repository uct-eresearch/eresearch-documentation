{% if page.edit_url %}
<a href="{{ 'support/feedback-fixes/' | url }}{% if page.edit_url %}?from={{ page.edit_url | urlencode }}{% endif %}"

  class="md-content__button docs-feedback-action"
>
  {% include ".icons/material/bug-outline.svg" %}
<span class="docs-feedback-action__label">Improve this page</span>

{% endif %}
