site_name: UCT eResearch Documentation
site_description: Research computing, software, data, and infrastructure guidance at the University of Cape Town
site_url: https://uct-eresearch.github.io/eresearch-documentation/
repo_url: https://github.com/uct-eresearch/eresearch-documentation
edit_uri: edit/main/docs/

use_directory_urls: true

theme:
  name: material
  logo: assets/images/eresearch-logo.png
  favicon: assets/images/favicon.png
  custom_dir: overrides
  icon:
    repo: fontawesome/brands/github
  
  features:
    - navigation.top
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.footer
    - content.tabs.link
    - toc.integrate
    - navigation.path
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - toc.follow          # Highlight on scroll
    - content.action.edit

  palette:
    - scheme: default
      primary: custom
      accent: custom

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/passwords.js

markdown_extensions:
  - footnotes
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - tables
  - md_in_html
  - pymdownx.blocks.caption
  - pymdownx.details
  - attr_list
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true 
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - toc:
      permalink: true      # Add anchor links
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
      toc_depth: 2       # Maximum depth


plugins:
  - glightbox
  - search

extra:
  homepage: /
  social: []
  generator: false
  consent:
    title: Cookie consent
    description: >- 
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
    actions:
      - accept
      - manage
      - reject

copyright: >
  © University of Cape Town · CC BY 4.0 · https://creativecommons.org/licenses/by/4.0/ - <a href="#__consent">Change cookie settings</a>
